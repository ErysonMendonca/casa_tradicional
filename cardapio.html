<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cardápio - Casa de Tradição</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
  </head>
  <body class="menu-page">
    <div id="app">
      <!-- HEADER -->
      <header class="header">
        <div class="header-container">
          <div class="header-left">
            <button class="hamburger-btn" aria-label="Menu">
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div class="logo-area">
              <a href="/">
                <img src="/logo_marca.png" alt="Logo Marca" class="logo-img" />
              </a>
            </div>
            <nav class="main-nav">
              <a href="/cardapio.html" class="active">VER CARDÁPIO</a>
              <a href="#pedir">PEDIR ONLINE</a>
              <a href="#gift">CARTÃO PRESENTE</a>
            </nav>
          </div>
          <div class="header-right">
            <a href="/admin.html" class="location-link">
               <span>Admin</span>
            </a>
            <a href="#lojas" class="location-link">
              <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
              <span>Encontrar loja</span>
            </a>
            <a href="#entrar" class="btn-outline">
              <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              <span>Entrar</span>
            </a>
            <button class="cart-btn" aria-label="Carrinho">
              <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            </button>
          </div>
        </div>
      </header>

      <main class="menu-view-container">
        <!-- SIDEBAR DINÂMICA -->
        <aside class="menu-sidebar">
          <div class="sidebar-search-box">
             <p>Selecione uma loja para ver pratos e preços completos.</p>
             <button class="btn-primary-small">BUSCAR LOJA</button>
          </div>
          <nav id="sidebar-categories" class="sidebar-categories">
            <!-- Categorias carregadas via JS -->
          </nav>
        </aside>

        <!-- CONTEÚDO PRINCIPAL DINÂMICO -->
        <section class="menu-main-content">
          <div class="menu-top-bar">
            <div class="search-menu-input">
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
              <input type="text" id="search-input" placeholder="Pesquisar no cardápio...">
            </div>
            <button class="btn-catering">Menu para Eventos</button>
          </div>

          <h2 id="main-title" class="section-title-center">TODAS AS CATEGORIAS</h2>

          <div id="menu-grid" class="menu-categories-grid">
            <!-- Cards de Categorias ou Produtos carregados via JS -->
          </div>
        </section>
      </main>

      <!-- MODAL DE DETALHES -->
      <div id="product-modal" class="modal-overlay">
        <div class="modal-container">
          <button class="close-modal">&times;</button>
          <div class="modal-content">
            <div class="modal-image">
              <img id="modal-img" src="" alt="">
            </div>
            <div class="modal-info">
              <h2 id="modal-title" class="modal-item-title"></h2>
              <p id="modal-desc" class="modal-item-desc"></p>
              <div class="modal-ingredients">
                 <h4>O QUE VAI NO PRATO:</h4>
                 <p id="modal-ingredients-list"></p>
              </div>
              <div class="modal-footer-action">
                <span id="modal-price" class="modal-item-price"></span>
                <button id="btn-request" class="btn-request">SOLICITAR PEDIDO</button>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
